<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- ground -->
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- board panel -->
  <rect x="44" y="26" width="232" height="148" rx="12" fill="#f3ece0" stroke="#b9a784" stroke-width="3"/>
  <!-- 3x3 tile grid hairlines -->
  <g stroke="#cdbb98" stroke-width="2">
    <line x1="120" y1="34" x2="120" y2="166"/>
    <line x1="200" y1="34" x2="200" y2="166"/>
    <line x1="52" y1="74"  x2="268" y2="74"/>
    <line x1="52" y1="126" x2="268" y2="126"/>
  </g>

  <!-- pipe casings (steel grey) carrying a connected path -->
  <g fill="none" stroke="#221f17" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <path d="M80 52 L80 100 L160 100 L160 150 L240 150 L240 100"/>
  </g>
  <g fill="none" stroke="#9a9486" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M80 52 L80 100 L160 100 L160 150 L240 150 L240 100"/>
  </g>
  <!-- blue water flowing through the bore -->
  <g fill="none" stroke="#2f6fb0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M80 52 L80 100 L160 100 L160 150 L240 150 L240 100"/>
  </g>

  <!-- flange collars at joints -->
  <g fill="#7c766a">
    <rect x="68" y="96"  width="24" height="9" rx="2"/>
    <rect x="156" y="96" width="9"  height="24" rx="2"/>
    <rect x="156" y="138" width="24" height="9" rx="2"/>
    <rect x="236" y="96" width="9"  height="24" rx="2"/>
  </g>

  <!-- source valve (amber wheel) at the top of the path -->
  <circle cx="80" cy="52" r="18" fill="#221f17"/>
  <circle cx="80" cy="52" r="14" fill="#c8923a"/>
  <g stroke="#221f17" stroke-width="4" stroke-linecap="round">
    <line x1="71" y1="43" x2="89" y2="61"/>
    <line x1="89" y1="43" x2="71" y2="61"/>
  </g>
  <circle cx="80" cy="52" r="4" fill="#221f17"/>

  <!-- drain ring (oxblood) at the open end -->
  <circle cx="240" cy="100" r="16" fill="none" stroke="#9b3a22" stroke-width="6"/>
  <circle cx="240" cy="100" r="6" fill="#9b3a22"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- printed puzzle sheet -->
  <rect x="88" y="20" width="144" height="160" rx="6" fill="#f3ece0"/>
  <!-- cell shading on a few given clues -->
  <rect x="100" y="32" width="32" height="32" fill="#e6dcc4"/>
  <rect x="164" y="64" width="32" height="32" fill="#e6dcc4"/>
  <rect x="100" y="128" width="32" height="32" fill="#e6dcc4"/>
  <rect x="196" y="96" width="32" height="32" fill="#e6dcc4"/>
  <!-- thin grid rules (5 internal lines each way over a 6x6 of 32px cells) -->
  <g stroke="#c8923a" stroke-width="2">
    <line x1="100" y1="64"  x2="228" y2="64"/>
    <line x1="100" y1="96"  x2="228" y2="96"/>
    <line x1="100" y1="128" x2="228" y2="128"/>
    <line x1="132" y1="32"  x2="132" y2="160"/>
    <line x1="196" y1="32"  x2="196" y2="160"/>
  </g>
  <!-- bold sub-box cages (2 rows x 3 cols pattern) + outer frame -->
  <g stroke="#221f17" stroke-width="5" fill="none">
    <rect x="100" y="32" width="128" height="128"/>
    <line x1="100" y1="96" x2="228" y2="96"/>
    <line x1="164" y1="32" x2="164" y2="160"/>
  </g>
  <!-- printed clue numbers (bold blocky glyphs from simple shapes) -->
  <!-- '5' top-left -->
  <g fill="#221f17">
    <rect x="110" y="40" width="12" height="4"/>
    <rect x="110" y="40" width="4"  height="8"/>
    <rect x="110" y="46" width="12" height="4"/>
    <rect x="118" y="46" width="4"  height="8"/>
    <rect x="110" y="52" width="12" height="4"/>
  </g>
  <!-- '3' center -->
  <g fill="#221f17">
    <rect x="174" y="72" width="12" height="4"/>
    <rect x="182" y="72" width="4"  height="20"/>
    <rect x="176" y="80" width="10" height="4"/>
    <rect x="174" y="88" width="12" height="4"/>
  </g>
  <!-- player entry '2' in olive (lighter, your move) -->
  <g fill="#6f6a3b">
    <rect x="206" y="104" width="12" height="4"/>
    <rect x="214" y="104" width="4"  height="8"/>
    <rect x="206" y="112" width="12" height="4"/>
    <rect x="206" y="112" width="4"  height="8"/>
    <rect x="206" y="120" width="12" height="4"/>
  </g>
  <!-- player entry '1' in olive bottom-left box -->
  <g fill="#6f6a3b">
    <rect x="114" y="136" width="4" height="20"/>
    <rect x="110" y="138" width="4" height="4"/>
  </g>
  <!-- a pencil to signal "you fill it in" -->
  <g>
    <rect x="40" y="150" width="60" height="12" rx="2" transform="rotate(-32 70 156)" fill="#c8923a"/>
    <polygon points="0,0 16,-6 16,6" transform="translate(43,141) rotate(-32)" fill="#9b3a22"/>
  </g>
</svg>

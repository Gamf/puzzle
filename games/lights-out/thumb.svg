<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- ground -->
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- dark console panel -->
  <rect x="86" y="26" width="148" height="148" rx="16" fill="#221f17"/>
  <rect x="96" y="36" width="128" height="128" rx="10" fill="#322820"/>

  <!-- 3x3 grid of light buttons; a plus/cross of LIT cells (the classic toggle) -->
  <!-- row 1 -->
  <rect x="104" y="44"  width="32" height="32" rx="7" fill="#4a3f2e"/>
  <rect x="144" y="44"  width="32" height="32" rx="7" fill="#c8923a"/>
  <rect x="184" y="44"  width="32" height="32" rx="7" fill="#4a3f2e"/>
  <!-- row 2 -->
  <rect x="104" y="84"  width="32" height="32" rx="7" fill="#9b3a22"/>
  <rect x="144" y="84"  width="32" height="32" rx="7" fill="#c8923a"/>
  <rect x="184" y="84"  width="32" height="32" rx="7" fill="#9b3a22"/>
  <!-- row 3 -->
  <rect x="104" y="124" width="32" height="32" rx="7" fill="#4a3f2e"/>
  <rect x="144" y="124" width="32" height="32" rx="7" fill="#c8923a"/>
  <rect x="184" y="124" width="32" height="32" rx="7" fill="#4a3f2e"/>

  <!-- lit inner marks on the glowing cells -->
  <rect x="151" y="51"  width="18" height="18" rx="4" fill="#f3e8cd"/>
  <rect x="151" y="91"  width="18" height="18" rx="4" fill="#f3e8cd"/>
  <rect x="151" y="131" width="18" height="18" rx="4" fill="#f3e8cd"/>
  <rect x="111" y="91"  width="18" height="18" rx="4" fill="#efddc6"/>
  <rect x="191" y="91"  width="18" height="18" rx="4" fill="#efddc6"/>
</svg>

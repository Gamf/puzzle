<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- cream ground -->
  <rect width="320" height="200" fill="#efe6d2"/>
  <!-- tray frame: the classic 15-puzzle's dark holding rim -->
  <rect x="92" y="20" width="160" height="160" rx="12" fill="#6f6a3b"/>
  <!-- recessed inner cream board -->
  <rect x="102" y="30" width="140" height="140" rx="8" fill="#f3ece0"/>

  <!-- row 1 -->
  <rect x="108" y="36" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="142" y="36" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="176" y="36" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="210" y="36" width="30" height="30" rx="5" fill="#c8923a"/>
  <!-- row 2 -->
  <rect x="108" y="70" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="142" y="70" width="30" height="30" rx="5" fill="#9b3a22"/>
  <rect x="176" y="70" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="210" y="70" width="30" height="30" rx="5" fill="#c8923a"/>
  <!-- row 3 -->
  <rect x="108" y="104" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="142" y="104" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="176" y="104" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="210" y="104" width="30" height="30" rx="5" fill="#c8923a"/>
  <!-- row 4: one empty recessed gap (the missing 16th slot) -->
  <rect x="108" y="138" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="142" y="138" width="30" height="30" rx="5" fill="#c8923a"/>
  <rect x="176" y="138" width="30" height="30" rx="5" fill="#e3d4b2"/>
  <rect x="210" y="138" width="30" height="30" rx="5" fill="#c8923a"/>

  <!-- a sliding-tile arrow: a loose ochre tile moving toward the gap -->
  <rect x="250" y="138" width="30" height="30" rx="5" fill="#c8923a"/>
  <path d="M236 153 l12 -8 v5 h10 v6 h-10 v5 z" fill="#221f17"/>
</svg>

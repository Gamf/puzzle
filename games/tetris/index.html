<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0f13">
  <title>Tetris — Gamf</title>
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;background:#0e0f13;color:#f2f3f5;
      font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;touch-action:none;
      -webkit-user-select:none;user-select:none}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;
      padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom)}
    .top{display:flex;align-items:center;gap:14px;width:min(96vw,420px);padding:10px 2px}
    .top a{color:#6c8cff;text-decoration:none;font-size:.9rem} .top .sc{margin-left:auto;font-weight:700}
    canvas{background:#11131b;border-radius:12px;touch-action:none;flex:0 1 auto}
    .pad{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(96vw,420px);margin-top:12px}
    .pad button{all:unset;text-align:center;background:#181b24;border:1px solid #242838;border-radius:14px;
      padding:16px 0;font-size:1.3rem;min-height:54px;cursor:pointer} .pad button:active{background:#222738}
    .over{position:fixed;inset:0;display:none;place-items:center;background:rgba(8,9,13,.82);z-index:3;text-align:center}
    .over.show{display:grid} .over h2{margin:0 0 6px} .over button{all:unset;margin-top:14px;color:#0e0f13;
      background:#6c8cff;font-weight:700;padding:12px 22px;border-radius:12px;cursor:pointer}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top"><a href="../../">← Puzzle</a>
      <span>Lv <b id="lvl">1</b></span><span class="sc">Score: <b id="score">0</b></span></div>
    <canvas id="c"></canvas>
    <div class="pad">
      <button id="left">◀</button><button id="rot">⟳</button>
      <button id="right">▶</button><button id="drop">⬇⬇</button>
    </div>
  </div>
  <div class="over" id="over"><div><h2>Game Over</h2><div>Score <b id="finalScore">0</b></div>
    <button id="again">Play again</button></div></div>
  <script type="module">
    import { onSwipe, onTap } from './touch.js';
    const COLS=10, ROWS=20;
    const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
    let cell=24;
    function fit(){ const maxH=innerHeight-210, maxW=Math.min(innerWidth-24,420);
      cell=Math.floor(Math.min(maxW/COLS, maxH/ROWS)); cell=Math.max(14,cell);
      const dpr=Math.min(devicePixelRatio||1,2);
      canvas.width=COLS*cell*dpr; canvas.height=ROWS*cell*dpr;
      canvas.style.width=COLS*cell+'px'; canvas.style.height=ROWS*cell+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
    addEventListener('resize', fit);

    const SHAPES={
      I:[[1,1,1,1]], O:[[1,1],[1,1]], T:[[0,1,0],[1,1,1]],
      S:[[0,1,1],[1,1,0]], Z:[[1,1,0],[0,1,1]], J:[[1,0,0],[1,1,1]], L:[[0,0,1],[1,1,1]] };
    const COLORS={I:'#5ad1e0',O:'#f2c14e',T:'#b06cff',S:'#5ad1a8',Z:'#ff7a6c',J:'#6c8cff',L:'#f29e4e'};
    const KEYS=Object.keys(SHAPES);

    let grid, piece, score, level, lines, dropMs, acc, last, gameOver;
    let seed=2024; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;

    function reset(){ grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
      score=0; level=1; lines=0; dropMs=800; acc=0; gameOver=false;
      document.getElementById('over').classList.remove('show'); spawn(); fit(); last=0; requestAnimationFrame(loop); }

    function newPiece(){ const k=KEYS[Math.floor(rnd()*KEYS.length)];
      return { k, m:SHAPES[k].map(r=>r.slice()), x:Math.floor(COLS/2)-1, y:0 }; }
    function spawn(){ piece=newPiece(); if(collides(piece,0,0)){ end(); } }

    function rotate(m){ return m[0].map((_,x)=>m.map(r=>r[x]).reverse()); }
    function collides(p,dx,dy,m=p.m){ for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++){
      if(!m[y][x]) continue; const nx=p.x+x+dx, ny=p.y+y+dy;
      if(nx<0||nx>=COLS||ny>=ROWS) return true; if(ny>=0&&grid[ny][nx]) return true; } return false; }
    function merge(){ piece.m.forEach((r,y)=>r.forEach((v,x)=>{ if(v){ const gy=piece.y+y; if(gy>=0) grid[gy][piece.x+x]=COLORS[piece.k]; }})); }
    function clearLines(){ let n=0; for(let y=ROWS-1;y>=0;y--){ if(grid[y].every(c=>c)){ grid.splice(y,1); grid.unshift(Array(COLS).fill(null)); n++; y++; } }
      if(n){ score+=[0,100,300,500,800][n]*level; lines+=n;
        if(lines>=level*10){ level++; dropMs=Math.max(120,800-(level-1)*70); }
        document.getElementById('score').textContent=score; document.getElementById('lvl').textContent=level; } }
    function lock(){ merge(); clearLines(); spawn(); }

    function move(dx){ if(!collides(piece,dx,0)) piece.x+=dx, draw(); }
    function rot(){ const m=rotate(piece.m); for(const k of [0,-1,1,-2,2]){ if(!collides(piece,k,0,m)){ piece.m=m; piece.x+=k; draw(); return; } } }
    function soft(){ if(!collides(piece,0,1)){ piece.y++; draw(); } else lock(); }
    function hard(){ while(!collides(piece,0,1)) piece.y++; lock(); draw(); }

    function loop(t){ if(gameOver) return; const dt=t-last; last=t; acc+=dt;
      if(acc>=dropMs){ acc=0; if(!collides(piece,0,1)) piece.y++; else lock(); }
      draw(); requestAnimationFrame(loop); }

    function block(x,y,c){ ctx.fillStyle=c; ctx.fillRect(x*cell+1,y*cell+1,cell-2,cell-2);
      ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(x*cell+1,y*cell+1,cell-2,4); }
    function draw(){ ctx.clearRect(0,0,COLS*cell,ROWS*cell);
      for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++) if(grid[y][x]) block(x,y,grid[y][x]);
      if(piece) piece.m.forEach((r,y)=>r.forEach((v,x)=>{ if(v) block(piece.x+x,piece.y+y,COLORS[piece.k]); })); }

    function end(){ gameOver=true; document.getElementById('finalScore').textContent=score;
      document.getElementById('over').classList.add('show'); }

    document.getElementById('left').onclick=()=>move(-1);
    document.getElementById('right').onclick=()=>move(1);
    document.getElementById('rot').onclick=rot;
    document.getElementById('drop').onclick=hard;
    document.getElementById('again').onclick=reset;
    onSwipe(canvas,(d)=>{ if(d==='left')move(-1); else if(d==='right')move(1); else if(d==='down')soft(); else rot(); },22);
    onTap(canvas, rot);
    addEventListener('keydown',e=>{ const k=e.key;
      if(k==='ArrowLeft')move(-1); else if(k==='ArrowRight')move(1);
      else if(k==='ArrowDown')soft(); else if(k==='ArrowUp')rot(); else if(k===' '){e.preventDefault();hard();} });
    reset();
  </script>
</body>
</html>

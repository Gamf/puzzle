<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#07080c">
  <title>Tetris — Gamf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../gamf.css">
  <style>
    body { --gx-accent: #6c8cff; }
    *{-webkit-user-select:none;user-select:none}
    html,body{height:100%;overflow:hidden;touch-action:none}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
      padding:calc(env(safe-area-inset-top) + 52px) 12px calc(env(safe-area-inset-bottom) + 56px)}
    canvas{border-radius:var(--r-md);touch-action:none;flex:0 1 auto;
      box-shadow:0 18px 50px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.04)}
    .pad{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(96vw,420px)}
    .pad button{all:unset;text-align:center;cursor:pointer;min-height:54px;padding:14px 0;font-size:1.3rem;
      border-radius:var(--r-md);color:var(--gx-text);background:var(--gx-surface-2);border:1px solid var(--gx-line-2)}
    .pad button:active{background:var(--gx-surface-3);transform:translateY(1px)}
  </style>
</head>
<body class="gx">
  <script src="../../gamf-icons.js"></script>

  <header class="gx-hud">
    <a class="gx-hud__back" href="../../"><svg class="gx-ico"><use href="#i-back"/></svg> Puzzle</a>
    <span class="gx-hud__spacer"></span>
    <span class="gx-pill">Lv <b id="lvl">1</b></span>
    <span class="gx-pill">Score <b id="score">0</b></span>
    <span class="gx-pill gx-pill--best"><svg class="gx-ico" style="width:1em;height:1em"><use href="#i-trophy"/></svg> Best <b id="best">0</b></span>
  </header>

  <div class="wrap">
    <canvas id="c"></canvas>
    <div class="pad">
      <button id="left" aria-label="left">◀</button><button id="rot" aria-label="rotate">⟳</button>
      <button id="right" aria-label="right">▶</button><button id="drop" aria-label="hard drop">⬇⬇</button>
    </div>
  </div>

  <div class="gx-hint">
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-touch"/></svg> Swipe · tap rotate</span>
    <span class="gx-hint__chip"><svg class="gx-ico"><use href="#i-keyboard"/></svg> Arrows · Space drop · P pause · R restart</span>
  </div>

  <div class="gx-modal" id="over"><div class="gx-modal__card"><h2 class="gx-modal__title">Game Over</h2>
    <div class="gx-modal__row">Score <b id="finalScore">0</b></div>
    <div class="gx-modal__row">Best <b id="finalBest">0</b></div>
    <button class="gx-btn gx-btn--primary" id="again"><svg class="gx-ico"><use href="#i-restart"/></svg> Play again</button></div></div>
  <script type="module">
    import { onSwipe, onTap } from './touch.js';
    const COLS=10, ROWS=20;
    const BEST_KEY='gamf-puzzle-tetris-best';
    const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
    let cell=24, dpr=1;
    function fit(){ const maxH=innerHeight-230, maxW=Math.min(innerWidth-24,420);
      cell=Math.floor(Math.min(maxW/COLS, maxH/ROWS)); cell=Math.max(14,cell);
      dpr=Math.min(devicePixelRatio||1,2);
      canvas.width=COLS*cell*dpr; canvas.height=ROWS*cell*dpr;
      canvas.style.width=COLS*cell+'px'; canvas.style.height=ROWS*cell+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0); draw(); }
    addEventListener('resize', fit);

    const SHAPES={
      I:[[1,1,1,1]], O:[[1,1],[1,1]], T:[[0,1,0],[1,1,1]],
      S:[[0,1,1],[1,1,0]], Z:[[1,1,0],[0,1,1]], J:[[1,0,0],[1,1,1]], L:[[0,0,1],[1,1,1]] };
    const COLORS={I:'#5ad1e0',O:'#f2c14e',T:'#b06cff',S:'#5ad1a8',Z:'#ff7a6c',J:'#6c8cff',L:'#f29e4e'};
    const KEYS=Object.keys(SHAPES);

    let grid, piece, score, level, lines, dropMs, acc, last, gameOver, paused, parts=[];
    let best=parseInt(localStorage.getItem(BEST_KEY)||'0',10)||0;
    document.getElementById('best').textContent=best;
    let seed=2024; const rnd=()=> (seed=(seed*1103515245+12345)&0x7fffffff)/0x7fffffff;

    function reset(){ grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));
      score=0; level=1; lines=0; dropMs=800; acc=0; gameOver=false; paused=false; parts=[];
      document.getElementById('score').textContent=0; document.getElementById('lvl').textContent=1;
      document.getElementById('over').classList.remove('gx-show'); spawn(); fit(); last=0; requestAnimationFrame(loop); }

    function newPiece(){ const k=KEYS[Math.floor(rnd()*KEYS.length)];
      return { k, m:SHAPES[k].map(r=>r.slice()), x:Math.floor(COLS/2)-1, y:0 }; }
    function spawn(){ piece=newPiece(); if(collides(piece,0,0)){ end(); } }

    function rotate(m){ return m[0].map((_,x)=>m.map(r=>r[x]).reverse()); }
    function collides(p,dx,dy,m=p.m){ for(let y=0;y<m.length;y++)for(let x=0;x<m[y].length;x++){
      if(!m[y][x]) continue; const nx=p.x+x+dx, ny=p.y+y+dy;
      if(nx<0||nx>=COLS||ny>=ROWS) return true; if(ny>=0&&grid[ny][nx]) return true; } return false; }
    function merge(){ piece.m.forEach((r,y)=>r.forEach((v,x)=>{ if(v){ const gy=piece.y+y; if(gy>=0) grid[gy][piece.x+x]=COLORS[piece.k]; }})); }
    function burst(gx,gy,c){ for(let i=0;i<8;i++){ const a=rnd()*Math.PI*2, s=1+rnd()*3;
      parts.push({x:gx*cell+cell/2,y:gy*cell+cell/2,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c}); } }
    function clearLines(){ let n=0; for(let y=ROWS-1;y>=0;y--){ if(grid[y].every(c=>c)){
        for(let x=0;x<COLS;x++) burst(x,y,grid[y][x]);
        grid.splice(y,1); grid.unshift(Array(COLS).fill(null)); n++; y++; } }
      if(n){ score+=[0,100,300,500,800][n]*level; lines+=n;
        if(lines>=level*10){ level++; dropMs=Math.max(120,800-(level-1)*70); }
        document.getElementById('score').textContent=score; document.getElementById('lvl').textContent=level; } }
    function lock(){ merge(); clearLines(); spawn(); }

    function move(dx){ if(paused||gameOver) return; if(!collides(piece,dx,0)) piece.x+=dx, draw(); }
    function rot(){ if(paused||gameOver) return; const m=rotate(piece.m);
      for(const k of [0,-1,1,-2,2]){ if(!collides(piece,k,0,m)){ piece.m=m; piece.x+=k; draw(); return; } } }
    function soft(){ if(paused||gameOver) return; if(!collides(piece,0,1)){ piece.y++; draw(); } else lock(); }
    function hard(){ if(paused||gameOver) return; while(!collides(piece,0,1)) piece.y++; lock(); draw(); }
    function togglePause(){ if(gameOver) return; paused=!paused; if(!paused){ last=performance.now(); requestAnimationFrame(loop); } else draw(); }

    let bgT=0;
    function loop(t){ if(gameOver||paused) return; const dt=t-last; last=t; acc+=dt; bgT+=dt;
      if(acc>=dropMs){ acc=0; if(!collides(piece,0,1)) piece.y++; else lock(); }
      step(); draw(); requestAnimationFrame(loop); }
    function step(){ for(const p of parts){ p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life-=.04; } parts=parts.filter(p=>p.life>0); }

    function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
    function block(x,y,c,ghost){ const px=x*cell, py=y*cell, m=2;
      if(ghost){ ctx.globalAlpha=.22; }
      const g=ctx.createLinearGradient(px,py,px,py+cell);
      g.addColorStop(0,c); g.addColorStop(1,shade(c,-26));
      ctx.shadowColor=c; ctx.shadowBlur=ghost?0:8; ctx.fillStyle=g;
      roundRect(px+m,py+m,cell-m*2,cell-m*2,4); ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,.18)'; roundRect(px+m,py+m,cell-m*2,Math.max(3,cell*.22),3); ctx.fill();
      ctx.globalAlpha=1; }
    function shade(hex,p){ const n=parseInt(hex.slice(1),16); let r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;
      r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
      return '#'+((r<<16)|(g<<8)|b).toString(16).padStart(6,'0'); }

    function ghostY(){ let dy=0; while(!collides(piece,0,dy+1)) dy++; return dy; }
    function draw(){ const W=COLS*cell, H=ROWS*cell;
      const bg=ctx.createLinearGradient(0,0,0,H); bg.addColorStop(0,'#13151f'); bg.addColorStop(1,'#0c0d13');
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(255,255,255,.03)'; ctx.lineWidth=1;
      for(let x=1;x<COLS;x++){ ctx.beginPath(); ctx.moveTo(x*cell,0); ctx.lineTo(x*cell,H); ctx.stroke(); }
      for(let y=1;y<ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*cell); ctx.lineTo(W,y*cell); ctx.stroke(); }
      for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++) if(grid[y][x]) block(x,y,grid[y][x]);
      if(piece&&!gameOver){ const gy=ghostY();
        piece.m.forEach((r,y)=>r.forEach((v,x)=>{ if(v) block(piece.x+x,piece.y+y+gy,COLORS[piece.k],true); }));
        piece.m.forEach((r,y)=>r.forEach((v,x)=>{ if(v) block(piece.x+x,piece.y+y,COLORS[piece.k]); })); }
      for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c;
        ctx.shadowColor=p.c; ctx.shadowBlur=8; ctx.fillRect(p.x-2,p.y-2,4,4); }
      ctx.globalAlpha=1; ctx.shadowBlur=0;
      if(paused){ ctx.fillStyle='rgba(8,9,13,.7)'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#fff'; ctx.font='700 '+Math.floor(cell*1.1)+'px system-ui'; ctx.textAlign='center';
        ctx.fillText('Paused',W/2,H/2); ctx.textAlign='left'; } }

    function end(){ gameOver=true;
      if(score>best){ best=score; localStorage.setItem(BEST_KEY,best); document.getElementById('best').textContent=best; }
      document.getElementById('finalScore').textContent=score;
      document.getElementById('finalBest').textContent=best;
      document.getElementById('over').classList.add('gx-show'); }

    document.getElementById('left').onclick=()=>move(-1);
    document.getElementById('right').onclick=()=>move(1);
    document.getElementById('rot').onclick=rot;
    document.getElementById('drop').onclick=hard;
    document.getElementById('again').onclick=reset;
    onSwipe(canvas,(d)=>{ if(d==='left')move(-1); else if(d==='right')move(1); else if(d==='down')soft(); else rot(); },22);
    onTap(canvas, rot);
    addEventListener('keydown',e=>{ const k=e.key;
      if(k==='ArrowLeft'||k==='a'||k==='A'){e.preventDefault();move(-1);}
      else if(k==='ArrowRight'||k==='d'||k==='D'){e.preventDefault();move(1);}
      else if(k==='ArrowDown'||k==='s'||k==='S'){e.preventDefault();soft();}
      else if(k==='ArrowUp'||k==='w'||k==='W'){e.preventDefault();rot();}
      else if(k===' '||k==='Enter'){e.preventDefault();hard();}
      else if(k==='p'||k==='P'){e.preventDefault();togglePause();}
      else if(k==='r'||k==='R'){e.preventDefault();reset();} });
    reset();
  </script>
</body>
</html>
